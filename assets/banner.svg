<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a5298;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="200" fill="url(#grad1)" rx="15" />
  
  <!-- Dynamic floating coins / nodes -->
  <circle cx="100" cy="150" r="10" fill="#f3ba2f" opacity="0.8">
    <animate attributeName="cy" values="150; 130; 150" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="700" cy="50" r="15" fill="#627eea" opacity="0.8">
    <animate attributeName="cy" values="50; 80; 50" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="600" cy="150" r="8" fill="#26a17b" opacity="0.8">
    <animate attributeName="cy" values="150; 120; 150" dur="5s" repeatCount="indefinite" />
  </circle>
  
  <text x="400" y="100" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">
    Awesome Crypto Exchanges
  </text>
  <text x="400" y="140" font-family="Arial, sans-serif" font-size="20" fill="#e0e0e0" text-anchor="middle">
    Top Platforms &amp; Open-Source Projects
  </text>
</svg>
